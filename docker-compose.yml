version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartspace_postgres
    environment:
      POSTGRES_USER: smartspace_user
      POSTGRES_PASSWORD: smartspace_password
      POSTGRES_DB: smartspace_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
